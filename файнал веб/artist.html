  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MuseHub — Artist Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
  <svg aria-hidden="true" style="display:none">
    <symbol id="icon-menu" viewBox="0 0 24 24">
      <rect x="3" y="6" width="18" height="2" rx="1" fill="currentColor"/>
      <rect x="3" y="11" width="18" height="2" rx="1" fill="currentColor"/>
      <rect x="3" y="16" width="18" height="2" rx="1" fill="currentColor"/>
    </symbol>
  </svg>

  <button class="mobile-menu-btn d-none" id="mobile-menu-btn" aria-label="Open menu" title="Menu">
    <svg class="icon" style="width:18px;height:18px"><use href="#icon-menu"></use></svg>
  </button>

  <aside class="sidebar" aria-label="Primary">
    <h4>MuseHub</h4>
    <nav class="nav-column" aria-label="Main navigation">
      <a href="index.html">Dashboard</a>
      <a href="artists.html">Artists</a>
      <a href="game.html">Mini-game</a>
      <a href="about.html">About / Contact</a>
    </nav>
  </aside>

  <main class="main">
    <h2 id="artist-name">Artist Name</h2>
    <img id="artist-photo" class="artist-photo" src="assets/images/placeholder.jpg" alt="artist" />
    <p><strong>Genre:</strong> <span id="artist-genre"></span></p>
    <p><strong>Country:</strong> <span id="artist-country"></span></p>

    <section>
      <h3>Biography</h3>
      <p id="artist-bio">Short bio will appear here.</p>
    </section>

    <section>
      <h3>Top tracks</h3>
      <ol id="artist-tracks"></ol>
    </section>

    <div style="margin-top:1rem">
      <button id="favorite-button" class="btn btn-primary">Add to favorites</button>
      <a href="artists.html" style="margin-left:1rem;color:var(--muted)">← Back</a>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
  (function(){
    const btn = document.getElementById('mobile-menu-btn');
    const sidebar = document.querySelector('.sidebar');
    if(!btn || !sidebar) return;
    btn.addEventListener('click', ()=>{ sidebar.classList.toggle('open'); document.body.classList.toggle('sidebar-open'); });
    sidebar.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>{ sidebar.classList.remove('open'); document.body.classList.remove('sidebar-open'); }));
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ sidebar.classList.remove('open'); document.body.classList.remove('sidebar-open'); } });
  })();
  </script>
  </body>
  </html>
