<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MuseHub — Artists</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<svg aria-hidden="true" style="display:none">
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <rect x="3" y="6" width="18" height="2" rx="1" fill="currentColor"/>
    <rect x="3" y="11" width="18" height="2" rx="1" fill="currentColor"/>
    <rect x="3" y="16" width="18" height="2" rx="1" fill="currentColor"/>
  </symbol>
</svg>

<button class="mobile-menu-btn d-none" id="mobile-menu-btn" aria-label="Open menu" title="Menu">
  <svg class="icon" style="width:18px;height:18px"><use href="#icon-menu"></use></svg>
</button>

<aside class="sidebar" aria-label="Primary">
  <h4>MuseHub</h4>
  <nav class="nav-column" aria-label="Main navigation">
    <a href="index.html">Dashboard</a>
    <a href="artists.html">Artists</a>
    <a href="game.html">Mini-game</a>
    <a href="about.html">About / Contact</a>
  </nav>
</aside>

<main class="main">
  <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap;">
    <h2>All Artists</h2>
    <div class="controls-wrap">
      <input id="search" placeholder="Search artists..." style="padding:.5rem 1rem; border-radius:999px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03)"/>
      <select id="genre"><option value="">All genres</option><option>Pop</option><option>R&B</option><option>Rock</option></select>
      <select id="sort"><option value="name">Sort by name</option></select>
    </div>
  </div>

  <ul id="artist-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" style="list-style:none; padding:0; margin:0"></ul>
</main>

<script type="module" src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function(){
  const btn = document.getElementById('mobile-menu-btn');
  const sidebar = document.querySelector('.sidebar');
  if(!btn || !sidebar) return;
  btn.addEventListener('click', ()=>{ sidebar.classList.toggle('open'); document.body.classList.toggle('sidebar-open'); });
  sidebar.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>{ sidebar.classList.remove('open'); document.body.classList.remove('sidebar-open'); }));
  document.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ sidebar.classList.remove('open'); document.body.classList.remove('sidebar-open'); } });
})();
</script>
<!-- Back-to-top button -->
<button id="back-to-top" title="Back to top" aria-label="Back to top">↑</button>

</body>
</html>
