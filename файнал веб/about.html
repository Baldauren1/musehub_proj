<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MuseHub — About & Contact</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<svg aria-hidden="true" style="display:none">
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <rect x="3" y="6" width="18" height="2" rx="1" fill="currentColor"/>
    <rect x="3" y="11" width="18" height="2" rx="1" fill="currentColor"/>
    <rect x="3" y="16" width="18" height="2" rx="1" fill="currentColor"/>
  </symbol>
  <symbol id="icon-user" viewBox="0 0 24 24">
    <path d="M12 12a4 4 0 100-8 4 4 0 000 8z" fill="currentColor"/>
    <path d="M3 20a9 9 0 0118 0" fill="currentColor"/>
  </symbol>
</svg>

<button class="mobile-menu-btn d-none" id="mobile-menu-btn" aria-label="Open menu" title="Menu">
  <svg class="icon" style="width:18px;height:18px"><use href="#icon-menu"></use></svg>
</button>

<aside class="sidebar" aria-label="Primary">
  <h4>MuseHub</h4>
  <nav class="nav-column" aria-label="Main navigation">
    <a href="index.html">Dashboard</a>
    <a href="artists.html">Artists</a>
    <a href="game.html">Mini-game</a>
    <a href="about.html">About / Contact</a>
  </nav>
</aside>

<main class="main">
  <h2>About MuseHub</h2>
  <p>MuseHub is a student project to browse artists, play tracks and enjoy mini-games.</p>

  <h3 style="margin-top:1.25rem">Contact</h3>
  <form id="contact-form" style="max-width:640px;">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input id="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input id="email" class="form-control" type="email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea id="message" class="form-control" rows="4" required></textarea>
    </div>
    <button class="btn btn-primary" type="submit">Send Message</button>
  </form>
</main>

<script type="module" src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function(){
  const btn = document.getElementById('mobile-menu-btn');
  const sidebar = document.querySelector('.sidebar');
  if(!btn || !sidebar) return;
  btn.addEventListener('click', ()=>{ sidebar.classList.toggle('open'); document.body.classList.toggle('sidebar-open'); });
  sidebar.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>{ sidebar.classList.remove('open'); document.body.classList.remove('sidebar-open'); }));
  document.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ sidebar.classList.remove('open'); document.body.classList.remove('sidebar-open'); } });
})();
</script>
</body>
</html>
